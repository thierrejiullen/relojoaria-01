<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relojoaria Vintage — Guia de Categorias & Públicos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b09;
    --surface: #161410;
    --surface2: #1e1c18;
    --surface3: #252219;
    --gold: #c9a96e;
    --gold-light: #e8d5a8;
    --gold-dim: rgba(201,169,110,0.35);
    --cream: #f0e8d8;
    --muted: #6b6158;
    --border: rgba(201,169,110,0.12);
    --border2: rgba(201,169,110,0.22);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 60%, rgba(201,169,110,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,169,110,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }
  .hero-title em { font-style: italic; color: var(--gold-light); }
  .hero-sub {
    font-size: 15px;
    font-weight: 300;
    color: var(--muted);
    max-width: 520px;
    margin: 1.5rem auto 3rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
  }
  .hero-rule {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 3rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.8s forwards;
  }
  .hero-cats {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    max-width: 700px;
    opacity: 0;
    animation: fadeUp 0.9s ease 1s forwards;
  }
  .hero-cat-pill {
    padding: 8px 18px;
    border: 1px solid var(--border2);
    border-radius: 100px;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--gold-light);
    background: rgba(201,169,110,0.06);
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
  }
  .hero-cat-pill:hover {
    background: rgba(201,169,110,0.14);
    border-color: var(--gold);
    color: var(--gold);
  }
  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }
  .scroll-hint span { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--gold-dim), transparent);
    animation: scrollPulse 2s ease-in-out 2s infinite;
  }

  /* ── NAV ── */
  .cat-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,11,9,0.94);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav-inner {
    display: flex;
    gap: 0;
    min-width: max-content;
    margin: 0 auto;
    max-width: 1200px;
  }
  .nav-btn {
    padding: 1.1rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-btn:hover { color: var(--gold-light); }
  .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── CATEGORY SECTION ── */
  .cat-section {
    display: none;
    max-width: 1200px;
    margin: 0 auto;
    padding: 5rem 1.5rem 6rem;
  }
  .cat-section.active { display: block; }

  .section-header {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 4rem;
    align-items: start;
    margin-bottom: 4rem;
    padding-bottom: 3rem;
    border-bottom: 1px solid var(--border);
  }
  .section-info {}
  .section-eyebrow {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 4vw, 3.8rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 1rem;
  }
  .section-title em { font-style: italic; color: var(--gold-light); }
  .section-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.75;
    max-width: 480px;
    margin-bottom: 1.5rem;
  }
  .section-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .stat-item {}
  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--gold);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── PERSONA CARD ── */
  .persona-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 1.75rem;
    position: relative;
    overflow: hidden;
  }
  .persona-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }
  .persona-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.2rem;
  }
  .persona-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .persona-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--gold);
    flex-shrink: 0;
  }
  .persona-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.2;
  }
  .persona-role {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .persona-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .persona-metric-lbl {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .persona-metric-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--gold-light);
  }
  .persona-section-title {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
    margin-top: 1rem;
  }
  .persona-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .persona-tag {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 100px;
    border: 1px solid var(--border2);
    color: var(--gold-light);
    background: rgba(201,169,110,0.06);
  }
  .persona-tag.motivation {
    border-color: rgba(201,169,110,0.3);
    background: rgba(201,169,110,0.1);
    color: var(--gold);
  }

  /* ── BRANDS GRID ── */
  .brands-section-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .brands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.5px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .brand-card {
    background: var(--surface);
    position: relative;
    transition: background 0.2s;
    cursor: pointer;
  }
  .brand-card:hover { background: var(--surface2); }
  .brand-img-wrap {
    position: relative;
    height: 200px;
    overflow: hidden;
    background: var(--surface2);
  }
  .brand-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
    filter: brightness(0.85) saturate(0.9);
  }
  .brand-card:hover .brand-img { transform: scale(1.05); filter: brightness(0.95) saturate(1); }
  .brand-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(12,11,9,0.85) 0%, rgba(12,11,9,0.1) 60%, transparent 100%);
  }
  .brand-badges {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }
  .badge {
    font-size: 9px;
    letter-spacing: 0.08em;
    padding: 3px 7px;
    border-radius: 100px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .badge-fb { background: rgba(24,95,165,0.85); color: #90c8ff; }
  .badge-vin { background: rgba(133,79,11,0.85); color: #f9cb42; }
  .badge-hot { background: rgba(201,169,110,0.85); color: #0c0b09; }
  .brand-body { padding: 1.1rem 1.1rem 1.25rem; }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: 0.25rem;
  }
  .brand-origin {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }
  .brand-models {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 0.75rem;
  }
  .model-tag {
    font-size: 10px;
    color: var(--muted);
    padding: 2px 7px;
    border: 1px solid rgba(107,97,88,0.3);
    border-radius: 100px;
  }
  .brand-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 0.7rem;
  }
  .brand-ticket {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--gold);
  }
  .brand-country { font-size: 10px; color: var(--muted); }

  /* ── FB ADS BOX ── */
  .fb-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .fb-box-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
  .fb-box-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .fb-box-text strong { color: var(--gold-light); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 3rem 1.5rem;
    text-align: center;
  }
  footer p {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  footer em {
    font-style: normal;
    color: var(--gold);
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.1); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .section-header { grid-template-columns: 1fr; gap: 2rem; }
    .persona-card { order: -1; }
    .brands-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  }
</style>
</head>

      { val: 'B / C', lbl: 'Perfil' },
      { val: '7+', lbl: 'FB Ads marcas' },
    ],
    persona: {
      avatar: 'CA', avatarBg: '#0a1218',
      name: 'Carolina A., 28',
      role: 'Profissional de Tech · Fitness · Conectada',
      age: '18–40 anos',
      renda: 'R$ 4k–15k/mês',
      location: 'Todo o Brasil',
      device: 'iPhone ou Android premium',
      behaviors: ['Usa Apple Watch ou Samsung Galaxy Watch', 'Pratica exercícios regularmente', 'Monitora saúde pelo relógio', 'Segue tendências de tecnologia'],
      motivations: ['Saúde e bem-estar', 'Conectividade e praticidade', 'Integração com iPhone/Android', 'Design moderno e funcional'],
      fbAds: 'Apple Watch · Samsung Watch · Garmin · fitness · tecnologia · gadgets · saúde',
    },
    brands: [
      { name: 'Apple Watch', origin: '🇺🇸 Cupertino, EUA', models: ['Series 9', 'Ultra 2', 'SE 2'], ticket: 'R$ 2k–12k', img: '1434494817466-5a696f00f6e5', fb: true, vin: false, hot: true },
      { name: 'Samsung Galaxy Watch', origin: '🇰🇷 Suwon, Coreia', models: ['Galaxy Watch 7', 'Ultra', 'FE'], ticket: 'R$ 1k–5k', img: '1542496658-e33a6d0d9e3d', fb: true, vin: false, hot: true },
      { name: 'Garmin', origin: '🇺🇸 Olathe, EUA', models: ['Fenix 8', 'Forerunner', 'Vívoactive 5', 'Instinct 3'], ticket: 'R$ 1k–8k', img: '1611241440-861b27539889', fb: true, vin: false, hot: true },
      { name: 'Withings', origin: '🇫🇷 Issy, França', models: ['ScanWatch 2', 'ScanWatch Light', 'Steel HR'], ticket: 'R$ 1k–5k', img: '1617038260897-41a1f14a8ca0', fb: true, vin: false, hot: false },
      { name: 'TAG Heuer Connected', origin: '🇨🇭 La Chaux-de-Fonds, Suíça', models: ['Calibre E4 45mm', 'Calibre E4 Golf'], ticket: 'R$ 10k–30k', img: '1547996160-81dfa63595aa', fb: true, vin: false, hot: false },
      { name: 'Fitbit', origin: '🇺🇸 San Francisco, EUA', models: ['Versa 4', 'Sense 2', 'Charge 6'], ticket: 'R$ 700–3k', img: '1548171915-54dc4de9d294', fb: true, vin: false, hot: false },
    ],
    fbTip: '💡 <strong>Estratégia de contra-posicionamento:</strong> Segmentar fãs de Apple Watch e Samsung Watch para oferecer relógios vintage como alternativa atemporal. Copy sugerido: "Enquanto o smartwatch fica obsoleto em 2 anos, este Omega dos anos 70 só valoriza."',
  },
];

// ── BUILD HERO PILLS ──
const heroCats = document.getElementById('hero-cats');
catalog.forEach(cat => {
  const a = document.createElement('a');
  a.className = 'hero-cat-pill';
  a.href = '#' + cat.id;
  a.textContent = cat.emoji + ' ' + cat.name;
  heroCats.appendChild(a);
});

// ── BUILD NAV ──
const navInner = document.getElementById('cat-nav-inner');
catalog.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.textContent = cat.emoji + ' ' + cat.name;
  btn.addEventListener('click', () => showCat(i));
  navInner.appendChild(btn);
});

// ── BUILD SECTIONS ──
const main = document.getElementById('main-content');

catalog.forEach((cat, idx) => {
  const sec = document.createElement('section');
  sec.className = 'cat-section' + (idx === 0 ? ' active' : '');
  sec.id = cat.id;

  const statsHtml = cat.stats.map(s =>
    `<div class="stat-item"><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`
  ).join('');

  const behavHtml = cat.persona.behaviors.map(b => `<span class="persona-tag">${b}</span>`).join('');
  const motivHtml = cat.persona.motivations.map(m => `<span class="persona-tag motivation">${m}</span>`).join('');

  const brandsHtml = cat.brands.map(b => {
    const badges = [
      b.fb ? '<span class="badge badge-fb">FB Ads ✓</span>' : '',
      b.vin ? '<span class="badge badge-vin">Vintage</span>' : '',
      b.hot ? '<span class="badge badge-hot">🔥 BR</span>' : '',
    ].join('');
    const models = b.models.map(m => `<span class="model-tag">${m}</span>`).join('');
    return `
      <div class="brand-card">
        <div class="brand-img-wrap">
          <img class="brand-img" src="${IMG(b.img)}" alt="${b.name}" loading="lazy">
          <div class="brand-img-overlay"></div>
          <div class="brand-badges">${badges}</div>
        </div>
        <div class="brand-body">
          <div class="brand-name">${b.name}</div>
          <div class="brand-origin">${b.origin}</div>
          <div class="brand-models">${models}</div>
          <div class="brand-footer">
            <span class="brand-ticket">${b.ticket}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  sec.innerHTML = `
    <div class="section-header">
      <div class="section-info">
        <div class="section-eyebrow">${cat.emoji} &nbsp; Categoria ${String(idx+1).padStart(2,'0')}</div>
        <h2 class="section-title"><em>${cat.name}</em><br>${cat.sub}</h2>
        <p class="section-desc">${cat.description}</p>
        <div class="section-stats">${statsHtml}</div>
      </div>
      <div class="persona-card">
        <div class="persona-label">Persona Principal</div>
        <div class="persona-top">
          <div class="persona-avatar" style="background:${cat.persona.avatarBg}">${cat.persona.avatar}</div>
          <div>
            <div class="persona-name">${cat.persona.name}</div>
            <div class="persona-role">${cat.persona.role}</div>
          </div>
        </div>
        <div class="persona-grid">
          <div><div class="persona-metric-lbl">Renda mensal</div><div class="persona-metric-val">${cat.persona.renda}</div></div>
          <div><div class="persona-metric-lbl">Localização</div><div class="persona-metric-val">${cat.persona.location}</div></div>
          <div><div class="persona-metric-lbl">Faixa etária</div><div class="persona-metric-val">${cat.persona.age}</div></div>
          <div><div class="persona-metric-lbl">Dispositivo</div><div class="persona-metric-val">${cat.persona.device}</div></div>
        </div>
        <div class="persona-section-title">Comportamentos</div>
        <div class="persona-tags">${behavHtml}</div>
        <div class="persona-section-title">Motivações de compra</div>
        <div class="persona-tags">${motivHtml}</div>
      </div>
    </div>
    <div class="brands-section-title">Marcas da categoria — ${cat.brands.length} marcas mapeadas</div>
    <div class="brands-grid">${brandsHtml}</div>
    <div class="fb-box">
      <div class="fb-box-icon">🎯</div>
      <div class="fb-box-text">
        <strong>Facebook Ads — Interesses recomendados para este segmento:</strong><br>
        ${cat.fbTip}
      </div>
    </div>
  `;

  main.appendChild(sec);
});

// ── TAB SWITCHING ──
function showCat(idx) {
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.cat-section').forEach((s, i) => s.classList.toggle('active', i === idx));
  window.scrollTo({ top: document.querySelector('.cat-nav').offsetTop - 1, behavior: 'smooth' });
}

// ── HERO PILL LINKS ──
document.querySelectorAll('.hero-cat-pill').forEach((pill, i) => {
  pill.addEventListener('click', e => {
    e.preventDefault();
    showCat(i);
    document.querySelector('.cat-nav').scrollIntoView({ behavior: 'smooth' });
  });
});
</script>
</body>
</html>
